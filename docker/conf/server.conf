# PyKMIP server config for RGW testing.
# Cert paths are under /certs (mounted from host ./certs).
# Run from docker-compose so ./certs and ./conf are mounted.

[server]
hostname=0.0.0.0
port=5696
certificate_path=/certs/server.crt
key_path=/certs/server.key
ca_path=/certs/ca.crt
auth_suite=TLS1.2
policy_path=/conf
enable_tls_client_auth=false
tls_cipher_suites=
    TLS_RSA_WITH_AES_128_CBC_SHA256
    TLS_RSA_WITH_AES_256_CBC_SHA256
    TLS_ECDHE_ECDSA_WITH_AES_256_CBC_SHA384
logging_level=DEBUG
database_path=/tmp/pykmip.sqlite
# database_pool_size / database_max_overflow removed — not supported by this PyKMIP version
database_pool_size=50
database_max_overflow=100
database_pool_timeout=60

[client]
host=localhost
port=5696
certfile=/certs/client.crt
keyfile=/certs/client.key
ca_certs=/certs/ca.crt
ssl_version=PROTOCOL_TLSv1_2
